services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
    - ./prometheus.yaml:/etc/prometheus/prometheus.yaml
    restart: unless-stopped
    networks:
      - monitoring
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
    - prometheus
    ports:
    - "80:80"
    networks:
      - monitoring

networks:
  monitoring: